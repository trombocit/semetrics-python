services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: semetrics_events_user
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: semetrics_events
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  svc_events:
    build:
      context: ../../backend
      dockerfile: svc_events/Dockerfile
    environment:
      DATABASE_URL: postgresql://semetrics_events_user:testpassword@postgres:5432/semetrics_events
      JWT_SECRET: test-jwt-secret-not-for-prod
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: testpassword
      BUILD_VERSION: test
    ports:
      - "18765:8010"
    depends_on:
      postgres:
        condition: service_healthy
